name: Deploy next-aws to EC2

on:
  push:
    branches:
      - main

concurrency:
  group: next-aws-production
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Build
        run: npm run build

      - name: Prepare standalone release bundle
        run: |
          set -euo pipefail

          test -d .next/standalone
          test -d .next/static

          rm -rf deploy_bundle
          mkdir -p deploy_bundle/.next

          cp -R .next/standalone/. deploy_bundle/
          cp -R .next/static deploy_bundle/.next/static

          if [ -d public ]; then
            cp -R public deploy_bundle/public
          fi

          cp ecosystem.config.cjs deploy_bundle/ecosystem.config.cjs

          printf '%s\n' "${GITHUB_SHA}" > deploy_bundle/REVISION

          tar -czf release.tar.gz -C deploy_bundle .

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: next-aws-release
          path: release.tar.gz
          retention-days: 1

  deploy:
    needs: ci
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download release artifact
        uses: actions/download-artifact@v4
        with:
          name: next-aws-release

      - name: Install SSH tools
        run: sudo apt-get update && sudo apt-get install -y openssh-client

      - name: Prepare SSH key
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          set -euo pipefail

          test -n "$EC2_HOST"
          test -n "$EC2_USER"
          test -n "$EC2_SSH_KEY"

          mkdir -p ~/.ssh
          printf '%s\n' "$EC2_SSH_KEY" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key

      - name: Test SSH connection
        run: |
          ssh \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o ConnectTimeout=15 \
            -i ~/.ssh/ec2_key \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            "echo '[ok] ssh connected'; whoami"

      - name: Prepare directories on EC2
        run: |
          ssh \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -i ~/.ssh/ec2_key \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            "mkdir -p /var/www/next-aws/releases /var/www/next-aws/shared /var/www/next-aws/scripts"

      - name: Upload deploy script
        run: |
          scp \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -i ~/.ssh/ec2_key \
            scripts/deploy.sh \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/var/www/next-aws/scripts/deploy.sh"

      - name: Upload release archive
        run: |
          scp \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -i ~/.ssh/ec2_key \
            release.tar.gz \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/next-aws-${GITHUB_SHA}.tar.gz"

      - name: Run remote deploy
        run: |
          ssh \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=3 \
            -i ~/.ssh/ec2_key \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            "chmod +x /var/www/next-aws/scripts/deploy.sh && RELEASE_ID=${GITHUB_SHA} /var/www/next-aws/scripts/deploy.sh"

      - name: Show deploy log
        run: |
          ssh \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -i ~/.ssh/ec2_key \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            "tail -n 100 /var/www/next-aws/deploy.log"
